name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 確保這與你的主分支名稱一致

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 編譯後的資料夾
          branch: gh-pages # 這是 GitHub Pages 預設讀取的分支
